<h1>Project Partner</h1>

{% if user.is_authenticated %}

    <h2>Welcome {{ user.username }}</h2>

    <a href="/project/create/">
        Create Project
    </a>

    <br><br>

    <a href="/projects/">
        Browse Projects
    </a>

    <br><br>

    <form action="/logout/" method="post">
    {% csrf_token %}
    <button type="submit">
        Logout
    </button>
    </form>

    <a href="/dashboard/">
    Dashboard
    </a>

    <br><br>

{% else %}

    <a href="/register/">
        Register
    </a>

    <br><br>

    <a href="/login/">
        Login
    </a>

{% endif %}
